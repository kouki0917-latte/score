<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採点システム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ===== スタート画面 ===== */
    #screen-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      gap: 24px;
    }
    #screen-start h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.06em; }
    #screen-start p  { color: #aaa; font-size: 14px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 340px; }
    .input-group label { font-size: 13px; color: #aaa; }
    .input-group input {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #f0f0f0;
      font-size: 15px;
    }
    .input-group input:focus { outline: none; border-color: #666; }

    .btn-primary {
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 340px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== 採点画面 ===== */
    #screen-score { display: none; flex-direction: column; min-height: 100vh; }

    .score-header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    .score-header .judge-name { font-size: 13px; color: #888; }
    .progress-text { font-size: 13px; color: #aaa; }

    .progress-bar-wrap { height: 3px; background: #222; }
    .progress-bar { height: 3px; background: #f0f0f0; transition: width 0.3s; }

    .image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 35vh;
    }
    .image-area img {
      max-width: 100%;
      max-height: 42vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .image-placeholder {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background: #1e1e1e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 14px;
    }

    /* ===== 採点パネル ===== */
    .scoring-panel {
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 16px 20px 20px;
    }

    .total-score-row {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 14px;
    }
    .total-label { font-size: 12px; color: #666; }
    .total-value { font-size: 26px; font-weight: 700; color: #f0f0f0; }
    .total-max   { font-size: 13px; color: #555; }

    .criteria-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }

    .criterion { display: flex; flex-direction: column; gap: 6px; }

    .criterion-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .criterion-label { font-size: 13px; color: #ccc; font-weight: 600; }
    .criterion-meta  { font-size: 11px; color: #555; }
    .criterion-score { font-size: 15px; font-weight: 700; color: #f0f0f0; min-width: 28px; text-align: right; }

    .half-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .half-btn {
      width: calc((100% - 45px) / 10);
      min-width: 28px;
      height: 36px;
      border-radius: 6px;
      border: 1.5px solid #2e2e2e;
      background: #1e1e1e;
      color: #555;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      font-weight: 600;
    }
    .half-btn:hover { border-color: #666; color: #ccc; }
    .half-btn.selected { background: #f0f0f0; color: #111; border-color: #f0f0f0; }

    .btn-next {
      width: 100%;
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-next:hover { opacity: 0.85; }
    .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== 完了画面 ===== */
    #screen-done {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      gap: 16px;
      text-align: center;
    }
    #screen-done h2 { font-size: 24px; font-weight: 700; }
    #screen-done p  { color: #aaa; font-size: 14px; line-height: 1.7; }
    .sending-msg { color: #666; font-size: 13px; }

    /* ===== 管理者設定 ===== */
    .admin-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #555;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; margin-top: 14px; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 13px;
      font-family: monospace;
    }
    .modal input:focus { outline: none; border-color: #555; }

    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1;
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-cancel {
      background: #2a2a2a;
      color: #aaa;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }
    .hint { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.6; }
  </style>
</head>
<body>

<!-- ===== スタート画面 ===== -->
<div id="screen-start">
  <h1>Scoring System</h1>
  <p>Please enter your name to begin.</p>
  <div class="input-group">
    <label>Judge Name</label>
    <input type="text" id="judge-name-input" placeholder="e.g. John Smith" />
  </div>
  <button class="btn-primary" id="btn-start" onclick="startScoring()">Start Scoring</button>
</div>

<!-- ===== 採点画面 ===== -->
<div id="screen-score">
  <div class="score-header">
    <span class="judge-name" id="header-judge"></span>
    <span class="progress-text" id="progress-text"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="image-area" id="image-area">
    <div class="image-placeholder">画像を読み込み中...</div>
  </div>

  <div class="scoring-panel">
    <div class="total-score-row">
      <span class="total-label">Total</span>
      <span class="total-value" id="total-display">—</span>
      <span class="total-max">/ 20 pts</span>
    </div>
    <div class="criteria-list" id="criteria-list"></div>
    <button class="btn-next" id="btn-next" onclick="nextImage()" disabled>Next →</button>
  </div>
</div>

<!-- ===== 完了画面 ===== -->
<div id="screen-done">
  <h2>Scoring Complete</h2>
  <p>You have scored all entries.<br>Thank you for your participation!</p>
  <p class="sending-msg" id="sending-status"></p>
</div>

<!-- ===== 管理者ボタン ===== -->
<button class="admin-toggle" onclick="openAdmin()">⚙ Admin</button>

<!-- ===== 管理者モーダル ===== -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <h3>Admin Settings</h3>
    <p class="hint">📁 Place images in the <code>figure/</code> folder and run <code>bash generate_manifest.sh</code>.</p>
    <label>Google Apps Script Web App URL</label>
    <input type="text" id="cfg-gas-url" placeholder="https://script.google.com/macros/s/xxxxx/exec" />
    <p class="hint">Paste the GAS URL where scores will be sent.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdmin()">Cancel</button>
      <button class="btn-save" onclick="saveAdmin()">Save</button>
    </div>
  </div>
</div>

<script>
  // =====================================================
  // 審査項目（固定）
  // 完成度は weight:2 → 最大10点、他は weight:1 → 最大5点ずつ、合計20点
  // =====================================================
  const CRITERIA = [
    { key: 'c1', label: 'Completion',     weight: 2, note: '×2 (max 10 pts)' },
    { key: 'c2', label: 'Contrast',       weight: 1, note: '×1 (max 5 pts)'  },
    { key: 'c3', label: 'Cup Balance',    weight: 1, note: '×1 (max 5 pts)'  },
  ];
  const HALF_STEPS = [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5];

  // =====================================================
  // ▼ GAS URL（直接記載）
  // =====================================================
  let gasUrl = 'https://script.google.com/macros/s/AKfycbzgKJUhjN0w1ijpxBbhCGMg6Eet7JKh3bd49qvMYFMO8ofE9Wm4uNDCyiSFCfo4XeJF/exec';
  // =====================================================

  let images = [];
  let judgeNameVal = '';
  let currentIndex = 0;
  let scores = [];

  // --- 設定ロード（localStorageで上書き可能） ---
  function loadConfig() {
    try {
      const saved = JSON.parse(localStorage.getItem('scoreConfig2') || '{}');
      if (saved.gasUrl) gasUrl = saved.gasUrl;
    } catch {}
  }

  // --- figure/manifest.json から画像取得 ---
  async function loadImages() {
    try {
      const res = await fetch('figure/manifest.json?t=' + Date.now());
      const entries = await res.json();
      // 旧形式（文字列配列）と新形式（{file,name}配列）の両方に対応
      images = entries.map(e => typeof e === 'string'
        ? { url: 'figure/' + encodeURIComponent(e), name: e.replace(/\.[^.]+$/, '') }
        : { url: 'figure/' + e.file, name: e.name }
      );
    } catch { images = []; }
  }

  // --- スタート ---
  async function startScoring() {
    judgeNameVal = document.getElementById('judge-name-input').value.trim();
    if (!judgeNameVal) { alert('Please enter your name.'); return; }

    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.textContent = 'Loading images...';
    await loadImages();
    btn.disabled = false;
    btn.textContent = 'Start Scoring';

    if (!images.length) {
      alert('No images found in figure/ folder.\nPlease run: bash generate_manifest.sh');
      return;
    }

    scores = images.map(img => ({ imageUrl: img.name, c1: null, c2: null, c3: null }));
    currentIndex = 0;

    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-score').style.display = 'flex';
    document.getElementById('header-judge').textContent = judgeNameVal + ' さん';

    buildCriteria();
    showImage(0);
  }

  // --- 審査項目UI生成 ---
  function buildCriteria() {
    const list = document.getElementById('criteria-list');
    list.innerHTML = CRITERIA.map(cr => `
      <div class="criterion">
        <div class="criterion-header">
          <span class="criterion-label">${cr.label}</span>
          <span class="criterion-meta">${cr.note}</span>
          <span class="criterion-score" id="score-display-${cr.key}">—</span>
        </div>
        <div class="half-btns" id="btns-${cr.key}">
          ${HALF_STEPS.map(v => `
            <button class="half-btn" data-key="${cr.key}" data-val="${v}"
              onclick="selectScore('${cr.key}',${v})">${v}</button>
          `).join('')}
        </div>
      </div>`).join('');
  }

  // --- 画像表示 ---
  function showImage(idx) {
    const total = images.length;
    document.getElementById('progress-text').textContent = `${idx + 1} / ${total}`;
    document.getElementById('progress-bar').style.width = ((idx + 1) / total * 100) + '%';

    const area = document.getElementById('image-area');
    const img = images[idx];
    area.innerHTML = `<img src="${img.url}" alt="${img.name}"
      onerror="this.parentElement.innerHTML='<div class=image-placeholder>Failed to load image</div>'">`;

    scores[idx] = { imageUrl: img.name, c1: null, c2: null, c3: null };
    CRITERIA.forEach(cr => {
      updateButtons(cr.key, null);
      document.getElementById('score-display-' + cr.key).textContent = '—';
    });
    document.getElementById('total-display').textContent = '—';
    document.getElementById('btn-next').disabled = true;
  }

  // --- 点数選択 ---
  function selectScore(key, val) {
    scores[currentIndex][key] = val;
    updateButtons(key, val);
    document.getElementById('score-display-' + key).textContent = val;
    updateTotal();
    checkAllScored();
  }

  function updateButtons(key, val) {
    document.querySelectorAll(`#btns-${key} .half-btn`).forEach(btn => {
      btn.classList.toggle('selected', parseFloat(btn.dataset.val) === val);
    });
  }

  function updateTotal() {
    const s = scores[currentIndex];
    const allSet = CRITERIA.every(cr => s[cr.key] !== null);
    if (!allSet) return;
    const total = CRITERIA.reduce((sum, cr) => sum + (s[cr.key] || 0) * cr.weight, 0);
    document.getElementById('total-display').textContent = total.toFixed(1).replace(/\.0$/, '');
  }

  function checkAllScored() {
    const s = scores[currentIndex];
    document.getElementById('btn-next').disabled = !CRITERIA.every(cr => s[cr.key] !== null);
  }

  // --- 次へ ---
  function nextImage() {
    currentIndex++;
    if (currentIndex >= images.length) showDone();
    else showImage(currentIndex);
  }

  // --- 完了・送信 ---
  function showDone() {
    document.getElementById('screen-score').style.display = 'none';
    document.getElementById('screen-done').style.display = 'flex';
    sendResults();
  }

  async function sendResults() {
    const status = document.getElementById('sending-status');
    if (!gasUrl) {
      status.textContent = '※ GAS URL is not set. Scores were not sent.';
      return;
    }
    status.textContent = 'Sending data...';
    try {
      const payload = {
        judge: judgeNameVal,
        timestamp: new Date().toISOString(),
        scores: scores.map(s => ({
          ...s,
          weighted_total: CRITERIA.reduce((sum, cr) => sum + (s[cr.key] || 0) * cr.weight, 0)
        }))
      };
      const params = new URLSearchParams({ data: JSON.stringify(payload) });
      await fetch(gasUrl + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
      status.textContent = 'Scores sent to spreadsheet successfully.';
    } catch (e) {
      status.textContent = 'Failed to send data: ' + e.message;
    }
  }

  // --- 管理者モーダル ---
  function openAdmin() {
    document.getElementById('cfg-gas-url').value = gasUrl;
    document.getElementById('admin-modal').classList.add('open');
  }
  function closeAdmin() {
    document.getElementById('admin-modal').classList.remove('open');
  }
  function saveAdmin() {
    gasUrl = document.getElementById('cfg-gas-url').value.trim();
    localStorage.setItem('scoreConfig2', JSON.stringify({ gasUrl }));
    closeAdmin();
    alert('Settings saved.');
  }

  loadConfig();
</script>

</body>
</html>
